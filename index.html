<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BalaBharati Q&A Game</title>
    <meta name="description" content="Simple kids quiz game for BalaBharati">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">BalaBharati</p>
        <h1>Question Time</h1>
        <p class="subtitle">Read the question. Tap the right answer. Have fun.</p>
      </header>

      <main class="quiz-card" aria-live="polite">
        <section class="status-row">
          <div class="pill">Question <span id="question-number">1</span></div>
          <div class="pill">Score <span id="score">0</span></div>
          <div class="pill">Best <span id="best-score">0</span></div>
        </section>

        <section class="question-block">
          <h2 id="question-text">Loading question...</h2>
        </section>

        <section id="answers" class="answers" aria-label="Answer choices"></section>

        <section id="feedback" class="feedback neutral">Choose an answer to begin.</section>

        <section class="action-row">
          <button id="next-button" class="primary-button" disabled>Next Question</button>
          <button id="restart-button" class="secondary-button">Play Again</button>
        </section>
      </main>

      <footer class="footer-note">
        <p>Made for kids. Simple, bright, and easy to play.</p>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
