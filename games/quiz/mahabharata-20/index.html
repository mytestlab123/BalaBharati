<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mahabharata 20 Quiz | BalaBharati</title>
    <meta name="description" content="A 20 question Mahabharata quiz for kids with fewer hints">
    <link rel="stylesheet" href="../../../assets/css/main.css">
  </head>
  <body data-quiz="mahabharata-20">
    <header class="site-header">
      <a class="brand" href="../../../">
        <span class="brand-mark">BB</span>
        <span>BalaBharati</span>
      </a>
      <nav class="top-nav" aria-label="Games">
        <a href="../">Quiz</a>
        <a href="../../hidden-objects/">Find</a>
        <a href="../../jigsaw/">Puzzle</a>
        <a href="../../symbols/">Symbols</a>
      </nav>
    </header>

    <main class="game-shell">
      <section class="game-header">
        <p class="eyebrow">20 question pack</p>
        <h1>Mahabharata 20 Quiz</h1>
        <p class="lead">A longer quiz about the Mahabharata, the Sanskrit epic from India.</p>
        <div class="status-row" aria-live="polite">
          <div class="pill">Question <span id="question-number">1</span>/<span id="question-total">1</span></div>
          <div class="pill">Score <span id="score">0</span></div>
          <div class="pill">Best <span id="best-score">0</span></div>
        </div>
      </section>

      <section class="play-panel" aria-live="polite">
        <div class="question-block">
          <h2 id="question-text">Loading question...</h2>
        </div>

        <div id="answers" class="answers" aria-label="Answer choices"></div>
        <div id="feedback" class="feedback">Choose the best answer.</div>

        <div class="action-row">
          <button id="next-button" class="control-button primary" type="button" disabled>Next Question</button>
          <button id="restart-button" class="control-button secondary" type="button">Play Again</button>
          <a class="button secondary" href="../">All Quizzes</a>
          <a class="button secondary" href="../../../">Home</a>
        </div>
      </section>
    </main>

    <script src="../../../assets/js/quiz.js"></script>
  </body>
</html>
